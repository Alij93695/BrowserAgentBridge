<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      width: 280px;
      margin: 0;
      padding: 16px;
      background-color: #0f172a;
      color: #f8fafc;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #334155;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 14px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(to right, #a78bfa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #1e293b;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      margin-bottom: 12px;
    }
    .status-label {
      font-size: 13px;
      color: #94a3b8;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }
    .status-dot.connected {
      background-color: #10b981;
      box-shadow: 0 0 8px #10b981;
    }
    .info-list {
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
    }
    .info-value {
      color: #f1f5f9;
      font-family: monospace;
    }
    .footer {
      font-size: 10px;
      color: #64748b;
      text-align: center;
      margin-top: 16px;
      border-top: 1px solid #1e293b;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">AB</div>
    <div class="title">BrowserAgentBridge</div>
  </div>
  <div class="status-container">
    <span class="status-label">Daemon Status</span>
    <div class="status-badge">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">Disconnected</span>
    </div>
  </div>
  <div class="info-list">
    <div class="info-item">
      <span>Daemon Address</span>
      <span class="info-value">localhost:1313</span>
    </div>
    <div class="info-item">
      <span>Extension Version</span>
      <span class="info-value">1.0.0</span>
    </div>
  </div>
  <div class="footer">
    Universal Browser Agent Bridge
  </div>
  <script src="popup.js"></script>
</body>
</html>
